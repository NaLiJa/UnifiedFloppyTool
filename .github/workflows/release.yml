# ============================================================================
# UnifiedFloppyTool - Release Build CI/CD
#
# Triggers on: push tag v*
# Produces:
#   - macOS:   UnifiedFloppyTool-{ver}-macOS-arm64.dmg + .tar.gz
#   - Linux:   unifiedfloppytool_{ver}_amd64.deb + .tar.gz
#   - Windows: UnifiedFloppyTool-{ver}-windows-x64.tar.gz
#
# Fixes applied:
#   FAILURE-001: macos-14 arch mismatch → removed clang_64
#   FAILURE-002: IQTA_TOOLS → add-tools-to-path: true
#   FAILURE-003: Triple-backslash escaping → env var UFT_VERSION
#   FAILURE-004: Heredoc indentation → printf-based control file
#   FAILURE-005: Universal Binary + Intel-only Qt → ARM64 native only
#   FAILURE-006: windeployqt PATH → add-tools-to-path handles it
# ============================================================================

name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  QT_VERSION: '6.10.1'

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # Linux (.deb + .tar.gz)
  # ══════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          modules: 'qtserialport'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libusb-1.0-0-dev \
            libgl1-mesa-dev \
            dpkg-dev \
            fakeroot

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Build (qmake)
        # MF-145: no inline DEFINES+=UFT_VERSION_STRING — qmake's
        # top-level system() call now invokes
        # scripts/generate_version_header.py which rewrites
        # include/uft/uft_version.h directly from VERSION.txt
        # (see UnifiedFloppyTool.pro top + MF-131). The header is
        # the single source of truth, no command-line escape
        # tricks needed; the previous \"${UFT_VERSION}\" form was
        # fragile under MinGW-bash and was the suspected cause of
        # the FB-user-report "title shows 4.1.0".
        run: |
          mkdir build && cd build
          qmake ../UnifiedFloppyTool.pro \
            CONFIG+=release \
            CONFIG+=cxx20
          make -j$(nproc)

      - name: Package .tar.gz
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          DIST="UnifiedFloppyTool-${VER}-linux-amd64"
          mkdir -p "${DIST}/bin"
          cp build/UnifiedFloppyTool "${DIST}/bin/"
          cp LICENSE README.md CHANGELOG.md "${DIST}/"
          cp tools/99-floppy-devices.rules "${DIST}/" 2>/dev/null || true
          tar czf "${DIST}.tar.gz" "${DIST}"

      - name: Package .deb
        # FIX-004: printf instead of indented heredoc + fragile sed
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          PKG="unifiedfloppytool_${VER}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "${PKG}/usr/share/metainfo"
          mkdir -p "${PKG}/usr/share/doc/unifiedfloppytool"

          cp build/UnifiedFloppyTool          "${PKG}/usr/bin/"
          cp packaging/linux/io.github.Axel051171.UnifiedFloppyTool.desktop \
                                              "${PKG}/usr/share/applications/"
          cp packaging/flatpak/io.github.Axel051171.UnifiedFloppyTool.metainfo.xml \
                                              "${PKG}/usr/share/metainfo/"
          cp resources/icons/app_256.png \
             "${PKG}/usr/share/icons/hicolor/256x256/apps/io.github.Axel051171.UnifiedFloppyTool.png"
          cp LICENSE                          "${PKG}/usr/share/doc/unifiedfloppytool/copyright"
          cp CHANGELOG.md                     "${PKG}/usr/share/doc/unifiedfloppytool/"

          # FIX-004: printf — no indentation issues, no fragile sed
          printf '%s\n' \
            "Package: unifiedfloppytool" \
            "Version: ${VER}" \
            "Architecture: amd64" \
            "Maintainer: Axel Kramer <axel@example.com>" \
            "Depends: libqt6widgets6 (>= 6.5), libqt6gui6 (>= 6.5), libqt6serialport6, libusb-1.0-0" \
            "Section: utils" \
            "Priority: optional" \
            "Homepage: https://github.com/Axel051171/UnifiedFloppyTool" \
            "Description: Forensic Floppy Disk Preservation Tool" \
            " UnifiedFloppyTool is a comprehensive tool for reading, analyzing," \
            " and preserving floppy disk images across all major retro formats." \
            > "${PKG}/DEBIAN/control"

          chmod 755 "${PKG}/usr/bin/UnifiedFloppyTool"
          dpkg-deb --build "${PKG}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            UnifiedFloppyTool-*-linux-amd64.tar.gz
            unifiedfloppytool_*_amd64.deb

  # ══════════════════════════════════════════════════════════════════════════
  # macOS (.dmg + .tar.gz) — ARM64 native (macos-14)
  # ══════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        # FIX-001: removed arch: clang_64 (Intel-only) — macos-14 is ARM64
        # FIX-005: no QMAKE_APPLE_DEVICE_ARCHS universal — ARM64 native only
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          modules: 'qtserialport'
          cache: true

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Build (qmake)
        # MF-145: see Linux build comment above; same MF-131 header
        # auto-regen path applies on macOS.
        # FIX-005: no QMAKE_APPLE_DEVICE_ARCHS — single arch (ARM64) clean build.
        run: |
          mkdir build && cd build
          qmake ../UnifiedFloppyTool.pro \
            CONFIG+=release \
            CONFIG+=cxx20
          make -j$(sysctl -n hw.ncpu)

      - name: Deploy Qt frameworks + create DMG
        run: |
          cd build
          macdeployqt UnifiedFloppyTool.app -dmg

      - name: Package
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          mv build/UnifiedFloppyTool.dmg \
             "UnifiedFloppyTool-${VER}-macOS-arm64.dmg"

          DIST="UnifiedFloppyTool-${VER}-macOS"
          mkdir "${DIST}"
          cp -R build/UnifiedFloppyTool.app "${DIST}/"
          cp LICENSE README.md CHANGELOG.md "${DIST}/"
          tar czf "${DIST}.tar.gz" "${DIST}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            UnifiedFloppyTool-*-macOS-arm64.dmg
            UnifiedFloppyTool-*-macOS.tar.gz

  # ══════════════════════════════════════════════════════════════════════════
  # Windows (.tar.gz)
  # ══════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt + MinGW
        # FIX-002: add-tools-to-path: true → no manual IQTA_TOOLS PATH manipulation
        # FIX-006: windeployqt now in PATH automatically via Qt bin dir
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          modules: 'qtserialport'
          tools: 'tools_mingw1310'
          add-tools-to-path: true
          cache: true

      - name: Verify toolchain
        shell: bash
        run: |
          which mingw32-make || (echo "ERROR: mingw32-make not in PATH" && exit 1)
          which qmake        || (echo "ERROR: qmake not in PATH"        && exit 1)
          which windeployqt  || (echo "ERROR: windeployqt not in PATH"  && exit 1)

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Build (qmake + MinGW)
        # MF-145: see Linux build comment above. The MinGW-bash
        # quoting was the worst offender — escaping a quoted version
        # string through three layers of bash + qmake never reliably
        # produced UFT_VERSION_STRING="4.1.3"; instead it landed
        # empty and the #ifndef-guarded fallback in the header took
        # over. Auto-regen of the header at qmake time eliminates
        # the entire class of failures.
        # FIX-002: no manual PATH export needed (add-tools-to-path).
        shell: bash
        run: |
          mkdir build && cd build
          qmake ../UnifiedFloppyTool.pro \
            CONFIG+=release \
            CONFIG+=cxx20
          mingw32-make -j$(nproc)

      - name: Deploy Qt DLLs
        # FIX-006: windeployqt in PATH via add-tools-to-path
        shell: bash
        run: |
          cd build/release
          windeployqt \
            --release \
            --no-translations \
            --no-opengl-sw \
            UnifiedFloppyTool.exe

      - name: Package .tar.gz
        shell: bash
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          DIST="UnifiedFloppyTool-${VER}-windows-x64"
          mkdir -p "${DIST}"
          cp build/release/UnifiedFloppyTool.exe "${DIST}/"
          cp build/release/*.dll                 "${DIST}/" 2>/dev/null || true
          cp -r build/release/platforms          "${DIST}/" 2>/dev/null || true
          cp -r build/release/styles             "${DIST}/" 2>/dev/null || true
          cp -r build/release/imageformats       "${DIST}/" 2>/dev/null || true
          cp LICENSE README.md CHANGELOG.md      "${DIST}/"
          tar czf "${DIST}.tar.gz" "${DIST}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: UnifiedFloppyTool-*-windows-x64.tar.gz

  # ══════════════════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ══════════════════════════════════════════════════════════════════════════
  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Generate SHA256SUMS
        run: |
          cd release-artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.dmg' -o -name '*.deb' \) \
            -exec sha256sum {} \; | sed 's|  \./|  |' | sort > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Name + prerelease flag derive from the git tag, not VERSION.txt:
          # VERSION.txt is numeric-only (4.1.4) and cannot carry an -rc/-beta
          # suffix. A tag with a hyphen suffix (v4.1.4-rc1) is a pre-release;
          # a clean vX.Y.Z tag is a full release.
          name: "UnifiedFloppyTool ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.deb
            release-artifacts/**/*.tar.gz
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
